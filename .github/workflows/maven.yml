name: Java CI with Maven Artifact

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    runs-on: ${{ matrix.os }}

    steps:
      # Bước 1: Checkout mã nguồn từ repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Thiết lập môi trường Java (sử dụng Java 21 như dự án của bạn)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Bước 4: Thực thi vòng đời build (test và package)
      - name: Build with Maven (Test & Package)
        run: mvn -B package --file pom.xml

      # Bước 5: Triển khai upload-artifact để lưu giữ tệp .jar
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-jar-${{ matrix.os }}  # Tên của artifact khi tải về
          path: target/*.jar        # Đường dẫn đến tệp .jar sau khi build xong
